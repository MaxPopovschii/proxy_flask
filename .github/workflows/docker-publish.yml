name: Build and Push Docker Image

on:
  push:
    branches:
      - main  # Trigger action on push to the 'main' branch

jobs:
  build:
    runs-on: ubuntu-latest  # Use the latest Ubuntu runner

    steps:
    # Step 1: Checkout code from the repository
    - name: Checkout code
      uses: actions/checkout@v3

    # Step 2: Log in to Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}  # Using the secret for Docker username
        password: ${{ secrets.DOCKER_PASSWORD }}  # Using the secret for Docker password

    # Step 3: Get the latest tag
    - name: Get latest tag
      id: get_latest_tag
      run: |
        # Fetch the latest tag from your Docker Hub repository
        latest_tag=$(curl -s https://registry.hub.docker.com/v2/repositories/${{ secrets.DOCKER_USERNAME }}/proxy_flask/tags | jq -r '.results[0].name')
        if [[ -z "$latest_tag" ]]; then
          echo "No tags found, starting from v1."
          version="v1"
        else
          # Extract the numeric part of the version (e.g., v1, v2, v3)
          version_num=$(echo $latest_tag | sed 's/v//')
          version="v$((version_num + 1))"  # Increment the version
        fi
        echo "Next version: $version"
        echo "::set-output name=version::$version"

    # Step 4: Build Docker image with the new version tag
    - name: Build Docker image
      run: |
        echo "Building Docker image with tag: ${{ secrets.DOCKER_USERNAME }}/proxy_flask:${{ steps.get_latest_tag.outputs.version }}"
        docker build -t ${{ secrets.DOCKER_USERNAME }}/proxy_flask:${{ steps.get_latest_tag.outputs.version }} .
        
    # Step 5: Push Docker image to Docker Hub
    - name: Push Docker image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/proxy_flask:${{ steps.get_latest_tag.outputs.version }}
